version: '3.8'

services:
  # CLI Mode - Command-line transcription
  transcribe:
    build: .
    image: local-transcription
    container_name: transcription-cli
    volumes:
      # Mount your media directory here
      - ./media:/media
    command: --help
    # Uncomment below to specify a specific video file
    # command: /media/your-video.mp4 --model base
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Web Interface Mode - Browser-based UI (NEW!)
  web:
    build: .
    image: local-transcription
    container_name: transcription-web
    ports:
      - "5731:5731"
    volumes:
      - ./outputs:/tmp/transcription_outputs
    command: python /app/app.py
    environment:
      - FLASK_ENV=production
      - FLASK_PORT=5731
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# Usage Examples:
# 
# CLI Mode:
# --------
# 1. Build the image:
#    docker-compose build
#
# 2. Show help:
#    docker-compose run --rm transcribe --help
#
# 3. Transcribe a file (place your video in ./media folder):
#    docker-compose run --rm transcribe /media/video.mp4
#
# 4. Transcribe with options:
#    docker-compose run --rm transcribe /media/video.mp4 --model large --animated-quotes
#
# Web Interface Mode (NEW!):
# --------------------------
# 1. Start web server:
#    docker-compose up web
#
# 2. Open browser to:
#    http://localhost:5731
#
# 3. Upload files, select options, and download results!

